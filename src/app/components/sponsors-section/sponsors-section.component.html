<section class="sponsors">
  <div class="sp-wrap">

    <div class="sp-header">
      <span class="sp-eyebrow">Proud Partners</span>
      <h2 class="sp-title">Our Sponsors &amp; Partners</h2>
    </div>

    <div class="sp-grid">
      @for (sponsor of sponsors; track sponsor.name) {
        <a [href]="sponsor.url" target="_blank" rel="noopener noreferrer" class="sp-card">
          <div class="sp-logo-area">
            @if (!logoFailed(sponsor.name)) {
              <img
                [src]="sponsor.logo"
                [alt]="sponsor.name"
                class="sp-logo-img"
                (error)="onLogoError(sponsor.name)"
              />
            }
            @if (logoFailed(sponsor.name)) {
              <div class="sp-logo-fallback">{{ sponsor.shortName }}</div>
            }
          </div>
          <span class="sp-name">{{ sponsor.name }}</span>
        </a>
      }
    </div>

  </div>
</section>
